<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notPlayzz | Bloxd.io Texture Packs</title>
    <style>
        /* NEON STYLE - Based on Bloxdman */
        body {
            /* Your custom background path */
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('assets/backgrounds/Survival 2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            image-rendering: pixelated; /* Keeps your 8x background sharp */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 2px solid #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            text-align: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffcc;
        }

        header h1 {
            margin-top: 60px;
            font-size: 3.5rem;
            text-transform: uppercase;
            color: #ff00ff; /* Neon Pink */
            text-shadow: 0 0 20px #ff00ff;
        }

        main {
            width: 90%;
            max-width: 800px;
            margin-top: 40px;
        }

        .pack-row {
            background: rgba(15, 15, 15, 0.95);
            margin-bottom: 15px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .pack-row:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            transform: scale(1.01);
        }

        .pack-info { text-align: left; }
        .pack-name { display: block; font-size: 1.4rem; font-weight: bold; color: #fff; }
        .pack-stats { font-size: 0.9rem; color: #00ffcc; }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .download-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            box-shadow: 0 0 10px #00ffcc;
        }

        .copy-btn {
            background: transparent;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>
    <nav><div class="logo">notPlayzz</div></nav>

    <header>
        <h1>Texture Packs</h1>
        <p>Adding 10 textures every day!</p>
    </header>

    <main>
        <div class="pack-row">
            <div class="pack-info">
                <span class="pack-name">notPlayzz 9K 8x</span>
                <span class="pack-stats">246 Files • 8x8 Performance</span>
            </div>
            
            <div class="btn-group">
                <!-- DOWNLOAD: Uses Download-Directory for the specific folder path -->
                <a href="https://downgit.github.io/#/home?url=https://github.com/isiguzoflorence521-gif/texture-packs/tree/main/packs/notPlayzz-9K-8x" 
                   class="btn download-btn">Download Pack</a>

                <!-- COPY: Raw URL for Bloxd Custom Settings -->
                <button class="btn copy-btn" onclick="copyRawLink()">Copy Link</button>
            </div>
        </div>
    </main>

    <script>
        function copyRawLink() {
            // Replace with your actual repo raw path
            const rawUrl = "https://raw.githubusercontent.com";
            navigator.clipboard.writeText(rawUrl);
            alert("Bloxd link copied! Paste into 'Custom' settings.");
        }
    </script>
</body>
</html>
